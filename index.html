<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Counter Parties</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: #f5f5f5;
    }

    .card-hover {
      cursor: pointer;
      transition: 0.2s;
    }

    .card-hover:hover {
      transform: scale(1.05);
    }

    .emoji {
      font-size: 2rem;
    }
  </style>
</head>

<body class="container py-4">

  <h1 class="text-center mb-4">🎯 Counter Parties</h1>

  <!-- AUTH -->
  <div id="auth-section" class="text-center">
    <button class="btn btn-danger w-100 mb-2" onclick="loginGoogle()">
      🔵 Login with Google
    </button>

    <button class="btn btn-dark w-100" onclick="loginApple()">
      🍎 Login with Apple
    </button>
  </div>

  <!-- APP -->
  <div id="app-section" style="display:none;">

    <div class="d-flex justify-content-between align-items-center mb-3">
      <div id="user-info"></div>
      <button class="btn btn-danger" onclick="logout()">Logout</button>
    </div>

    <h3>Your Parties</h3>
    <div id="party-list" class="row"></div>

    <hr>

    <h4>Create Party</h4>
    <input id="party-title" class="form-control mb-2" placeholder="Party name">
    <button class="btn btn-success mb-3" onclick="createParty()">Create</button>

    <h4>Join Party</h4>
    <input id="join-code" class="form-control mb-2" placeholder="Enter join code">
    <button class="btn btn-info mb-3" onclick="joinParty()">Join</button>

    <hr>

    <!-- PARTY VIEW -->
    <div id="party-section" style="display:none;">
      <h3 id="party-name"></h3>

      <div class="row" id="counters"></div>

      <h4 class="mt-3">Add Counter</h4>
      <input id="counter-title" class="form-control mb-2" placeholder="Title">
      <input id="counter-emoji" class="form-control mb-2" placeholder="Emoji (🔥 🍺 🎮)">
      <button class="btn btn-primary" onclick="addCounter()">Add Counter</button>
    </div>

  </div>

  <script type="module" src="app.js"></script>

</body>
</html>
