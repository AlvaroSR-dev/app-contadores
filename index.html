<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Counter Parties</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: #f5f5f5;
    }

    .counter-card {
      cursor: pointer;
      transition: 0.2s;
    }

    .counter-card:hover {
      transform: scale(1.05);
    }

    .emoji {
      font-size: 2rem;
    }
  </style>
</head>
<body class="container py-4">

  <h1 class="text-center mb-4">🎯 Counter Parties</h1>

  <!-- AUTH -->
  <div id="auth-section">
    <input id="email" class="form-control mb-2" placeholder="Email">
    <input id="password" type="password" class="form-control mb-2" placeholder="Password">
    <button class="btn btn-primary w-100 mb-2" onclick="login()">Login</button>
    <button class="btn btn-secondary w-100" onclick="register()">Register</button>
  </div>

  <!-- MAIN -->
  <div id="app-section" style="display:none;">
    <button class="btn btn-danger mb-3" onclick="logout()">Logout</button>

    <h3>Your Parties</h3>
    <div id="party-list" class="row"></div>

    <hr>

    <h4>Create Party</h4>
    <input id="party-title" class="form-control mb-2" placeholder="Party name">
    <button class="btn btn-success mb-3" onclick="createParty()">Create</button>

    <h4>Join Party</h4>
    <input id="join-code" class="form-control mb-2" placeholder="Enter join code">
    <button class="btn btn-info" onclick="joinParty()">Join</button>

    <hr>

    <div id="party-section" style="display:none;">
      <h3 id="party-name"></h3>

      <div class="row" id="counters"></div>

      <h4 class="mt-3">Add Counter</h4>
      <input id="counter-title" class="form-control mb-2" placeholder="Title">
      <input id="counter-emoji" class="form-control mb-2" placeholder="Emoji">
      <button class="btn btn-primary" onclick="addCounter()">Add Counter</button>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
